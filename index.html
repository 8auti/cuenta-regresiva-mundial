<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Regresiva Mundial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cd-wrap">
        <p class="cd-title">¡¡Vamos Argentina!!</p>
        <div class="cd-grid" id="grid">
            <div class="cd-unit">
                <div class="cd-num" id="days">--</div>
                <div class="cd-label">días</div>
            </div>
            <div class="cd-unit">
                <div class="cd-num" id="hours">--</div>
                <div class="cd-label">horas</div>
            </div>
            <div class="cd-unit">
                <div class="cd-num" id="mins">--</div>
                <div class="cd-label">minutos</div>
            </div>
            <div class="cd-unit">
                <div class="cd-num" id="secs">--</div>
                <div class="cd-label">segundos</div>
            </div>
        </div>
    </div>

    <script>
        // Fecha del primer partido de Argentina en el Mundial 2026 (17 de junio de 2026 a la 1:00 UTC)
        var countDownDate = new Date(Date.UTC(2026, 5, 17, 1, 0, 0)).getTime();

        var x = setInterval(function() {
            // Fecha y hora actual en milisegundos
            var now = new Date().getTime();
            // Distancia entre la fecha actual y la fecha del partido
            var distancia = countDownDate - now;
            
            // Cálculo de días, horas, minutos y segundos
            var dias = Math.floor(distancia / 86400000);
            var horas = Math.floor((distancia % 86400000) / 3600000);
            var minutos = Math.floor((distancia % 3600000) / 60000);
            var segundos = Math.floor((distancia % 60000) / 1000);

            // Actualización del HTML con los valores calculados
            document.getElementById('days').innerHTML = dias;
            document.getElementById('hours').innerHTML = horas;
            document.getElementById('mins').innerHTML = minutos;
            document.getElementById('secs').innerHTML = segundos;

            // Si la cuenta regresiva terminó, mostrar un mensaje
            if (distancia < 0) {
                clearInterval(x);
                document.getElementById('grid').innerHTML = '<p class="cd-done">¡Argentina ya jugo su primer partido!</p>';
            }
        }, 1000);
    </script>
</html>
